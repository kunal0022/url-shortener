name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-api

jobs:

  # ── Stage 1: Code Quality ─────────────────────────────
  code-quality:
    name: Code Quality & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flake8 bandit safety
          pip install -r services/api/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 services/api/app.py \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --statistics
        continue-on-error: true

      - name: Security scan with Bandit
        run: |
          bandit -r services/api/app.py \
            -f json \
            -o bandit-report.json \
            --severity-level medium
        continue-on-error: true

      - name: Check dependencies for vulnerabilities
        run: |
          safety check \
            -r services/api/requirements.txt \
            --json
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ── Stage 2: SonarCloud Scan ──────────────────────────
  sonar-scan:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and run tests
        run: |
          pip install pytest pytest-cov
          pip install -r services/api/requirements.txt
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=kunal0022_url-shortener
            -Dsonar.organization=kunal0022
            -Dsonar.sources=services/api
            -Dsonar.python.version=3.11
        continue-on-error: true

  # ── Stage 3: Build & Push ─────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: code-quality
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 4: Trivy Image Scan ─────────────────────────
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Run Trivy and save SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Run Trivy for Kubernetes manifests
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: k8s/
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
        continue-on-error: true

  # ── Stage 5: Validate K8s Manifests ──────────────────
  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.2'

      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate base manifests with kubeconform
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -summary \
            k8s/base/

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: |
          helm lint ./helm/url-shortener

      - name: Validate Helm template
        run: |
          helm template url-shortener ./helm/url-shortener \
            | kubeconform \
              -strict \
              -ignore-missing-schemas \
              -summary

  # ── Stage 6: Deploy ───────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: [trivy-scan, validate-manifests]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update image tag in manifests
        run: |
          sed -i "s|image: docker002275/url-shortener-api:.*|image: docker002275/url-shortener-api:${{ github.sha }}|g" \
            k8s/base/api/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add k8s/base/api/deployment.yaml
          git diff --staged --quiet || \
            git commit -m "ci: update image tag to ${{ github.sha }}"
          git push

      - name: Wait for ArgoCD to sync
        run: |
          argocd app wait url-shortener \
            --health \
            --timeout 120 \
            --insecure \
            --server localhost:8888 \
            --auth-token $(argocd account generate-token \
              --account admin \
              --insecure \
              --server localhost:8888) \
          || echo "ArgoCD sync check skipped"

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api \
            -n url-shortener \
            --timeout=120s

      - name: Run smoke test
        run: |
          sleep 10
          curl -f http://localhost:5000/health || \
            echo "Smoke test failed - check logs"
